<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Pesanan</title>

    <!-- Bootstrap CSS ONLY -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="purchase.css">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">📋 Data Pesanan</h3>

        <!-- Form -->
        <div class="row mb-3">
            <div class="col-md-5">
                <input type="text" id="paket" class="form-control" placeholder="Nama Paket">
            </div>
            <div class="col-md-5">
                <input type="number" id="harga" class="form-control" placeholder="harga">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="tambah()">Tambah</button>
            </div>
        </div>

        <!-- Table -->
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>No</th>
                    <th>Paket</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="data"></tbody>
        </table>

        <a href="index.html" class="btn btn-secondary">Kembali</a>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("orders")) || [];

function tampil() {
    let html = "";
    for(let i=0; i<data.length; i++){
        html += `
        <tr>
            <td>${i+1}</td>
            <td>${data[i].paket}</td>
            <td>Rp ${data[i].harga}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="edit(${i})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="hapus(${i})">Hapus</button>
            </td>
        </tr>`;
    }
    document.getElementById("data").innerHTML = html;
}

function tambah() {
    let paket = document.getElementById("paket").value;
    let harga = document.getElementById("harga").value;

    if(paket == "" || harga == "") {
        alert("Isi data dulu!");
        return;
    }

    data.push({paket: paket, harga: harga});
    localStorage.setItem("orders", JSON.stringify(data));

    document.getElementById("paket").value = "";
    document.getElementById("harga").value = "";

    tampil();
}

function hapus(i) {
    data.splice(i, 1);
    localStorage.setItem("orders", JSON.stringify(data));
    tampil();
}

function edit(i) {
    let paketBaru = prompt("Edit paket:", data[i].paket);
    let hargaBaru = prompt("Edit harga:", data[i].harga);

    if(paketBaru && hargaBaru){
        data[i].paket = paketBaru;
        data[i].harga = hargaBaru;

        localStorage.setItem("orders", JSON.stringify(data));
        tampil();
    }
}

tampil();
</script>

</body>
</html>
